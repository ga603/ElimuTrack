{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-center mb-4">Select Class to Mark</h2>
        <div class="list-group shadow">
            {% for class_name in classes %}
                <a href="{% url 'mark_attendance' class_name %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <span class="fw-bold">{{ class_name }}</span>
                    <span class="badge bg-primary rounded-pill"><i class="bi bi-arrow-right"></i> Enter Class</span>
                </a>
            {% empty %}
                <div class="list-group-item text-center text-muted">
                    No classes found. Add students first!
                </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
