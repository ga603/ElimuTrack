{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Marking Register: <span class="text-primary">{{ class_name }}</span></h3>
    <span class="badge bg-secondary fs-6">{{ today }}</span>
</div>

<form method="POST">
    {% csrf_token %}
    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-striped mb-0 align-middle">
                <thead class="bg-light">
                    <tr>
                        <th>Student</th>
                        <th class="text-center">Status</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td class="fw-bold">{{ student.first_name }} {{ student.last_name }}</td>
                        <td class="text-center">
                            <div class="btn-group" role="group">
                                <input type="radio" class="btn-check" name="status_{{ student.id }}" id="present_{{ student.id }}" value="PRESENT" checked>
                                <label class="btn btn-outline-success" for="present_{{ student.id }}">Present</label>

                                <input type="radio" class="btn-check" name="status_{{ student.id }}" id="absent_{{ student.id }}" value="ABSENT">
                                <label class="btn btn-outline-danger" for="absent_{{ student.id }}">Absent</label>

                                <input type="radio" class="btn-check" name="status_{{ student.id }}" id="late_{{ student.id }}" value="LATE">
                                <label class="btn btn-outline-warning" for="late_{{ student.id }}">Late</label>
                            </div>
                        </td>
                        <td>
                            <input type="text" name="remarks_{{ student.id }}" class="form-control form-control-sm" placeholder="Optional remark...">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="card-footer text-end">
            <a href="{% url 'class_dashboard' %}" class="btn btn-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary px-4">Save Attendance</button>
        </div>
    </div>
</form>
{% endblock %}
