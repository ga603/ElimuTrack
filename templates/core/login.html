<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Dundori SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; }
        .school-logo { width: 80px; height: 80px; background: #0d6efd; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; margin: 0 auto 20px; }
    </style>
</head>
<body>

<div class="card login-card shadow border-0">
    <div class="card-body p-4">
        <div class="school-logo">
            <i class="bi bi-mortarboard-fill">DS</i>
        </div>
        <h4 class="text-center fw-bold mb-4">Staff Login</h4>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-muted">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'student_portal' %}" class="text-decoration-none text-secondary">
                Are you a Student? <strong>Access Portal</strong>
            </a>
        </div>
    </div>
</div>

</body>
</html>
