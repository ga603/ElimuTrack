{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card shadow border-danger">
            <div class="card-body p-4">
                <i class="bi bi-exclamation-circle text-danger display-4"></i>
                <h3 class="mt-3">Delete Student?</h3>
                <p>Are you sure you want to delete <strong>{{ student.first_name }} {{ student.last_name }}</strong>?</p>
                <p class="text-muted small">This action cannot be undone.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Delete Permanently</button>
                    <a href="{% url 'student_detail' student.pk %}" class="btn btn-light w-100">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
