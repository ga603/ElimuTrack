{% extends 'base.html' %}
{% block content %}
<h2>Add New Student</h2>
<div class="card p-4">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Student</button>
    </form>
</div>
{% endblock %}
