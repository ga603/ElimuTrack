{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Enter Marks / Results</h4>
            </div>
            <div class="card-body">
                <form method="GET" action="">

    <div class="mb-3">
        <label class="form-label">Select Academic Year</label>
        <select name="year_id" class="form-select" required>
            <option value="">-- Choose Year --</option>
            {% for year in years %}
                <option value="{{ year.id }}">{{ year }}</option> 
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Select Exam / Term</label>
        <select name="term_id" class="form-select" required>
            <option value="">-- Choose Exam --</option>
            {% for term in terms %}
                <option value="{{ term.id }}">{{ term.name }}</option> 
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Select Subject</label>
        <select name="subject_id" class="form-select" required>
            <option value="">-- Choose Subject --</option>
            {% for subject in subjects %}
                <option value="{{ subject.id }}">{{ subject.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-4">
        <label class="form-label">Selected Class</label>
        <input type="text" class="form-control bg-light" value="{{ current_class }}" disabled>
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-bold">Proceed to Mark Sheet</button>
</form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
